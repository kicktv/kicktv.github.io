<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f1f1f1;
    display: flex;
    justify-content: center; /* Center form horizontally */
    align-items: center; /* Center form vertically */
    height: 100vh;
    margin: 0;
}

.login-container {
    background-color: #fff;
    padding: 2rem;
    border-radius: 8px; /* Rounded corners */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Smooth shadows */
    width: 100%;
    max-width: 400px;
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 1.5rem;
}

.input-group {
    margin-bottom: 1rem;
}

.input-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box; /* Ensures padding doesn't affect width */
}

.input-group input:focus {
    outline: none;
    border-color: #007bff; /* Stylish input fields with focus effects */
}

button {
    width: 100%;
    padding: 0.75rem;
    background-color: #007bff; /* Consistent, modern blue button */
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #0056b3;
}

.footer-links {
    margin-top: 1rem;
    text-align: center;
    font-size: 0.875rem;
}

.footer-links a {
    color: #007bff;
    text-decoration: none;
}

.footer-links a:hover {
    text-decoration: underline;
}

.footer-links span {
    display: block;
    margin-top: 0.5rem;
}

/* Basic responsiveness for smaller screens */
@media (max-width: 500px) {
    .login-container {
        padding: 1rem;
        margin: 1rem;
    }
}

</style> <!-- Link to external CSS file -->
</head>
<body>
    <div class="login-container">
        <form action="#" method="post"> <!-- The form can be processed by a backend script later -->
            <h2>Login</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required> <!-- Input type "password" masks the text -->
            </div>
            <button type="submit">Login</button>
            <div class="footer-links">
                <a href="#">Forgot password?</a>
                <span>Don't have an account? <a href="#">Sign up</a></span>
            </div>
        </form>
    </div>
</body>
</html>
